<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- システムバスでのorg.presire.qzypperのポリシー -->

  <policy user="root">
    <allow own="org.presire.qzypper"/>
    <allow send_destination="org.presire.qzypper"/>
  </policy>

  <policy context="default">
    <!-- 全ユーザがバックエンドにメッセージを送信可能 (Polkitで認証) -->
    <allow send_destination="org.presire.qzypper"/>
    <allow receive_sender="org.presire.qzypper"/>
  </policy>
</busconfig>
